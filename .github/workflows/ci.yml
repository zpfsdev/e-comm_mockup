name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: API – lint, type-check, build, test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile
        working-directory: .

      - run: pnpm lint
      - run: pnpm type-check
      - run: pnpm build
      - run: pnpm test --passWithNoTests

  frontend:
    name: Web – lint, type-check, build, test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile
        working-directory: .

      - name: Create .env for build
        run: |
          echo "NEXT_PUBLIC_API_URL=http://localhost:3001" >> .env
          echo "NEXT_TELEMETRY_DISABLED=1" >> .env

      - run: pnpm lint
      - run: pnpm type-check
      - run: pnpm build
        env:
          NEXT_TELEMETRY_DISABLED: 1
      - run: pnpm test --passWithNoTests
