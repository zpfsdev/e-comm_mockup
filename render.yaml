envVarGroups:
  - name: artistryx-shared-secrets
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: REFRESH_TOKEN_SECRET
        generateValue: true
      - key: CSRF_SECRET
        generateValue: true

services:
  # ── NestJS API ──────────────────────────────────────────────────────────────
  - type: web
    name: artistryx-api
    runtime: node
    region: singapore
    plan: free
    rootDir: apps/api
    buildCommand: |
      pnpm install &&
      npx prisma generate &&
      pnpm run build
    startCommand: node dist/src/main.js
    healthCheckPath: /api/v1/health
    envVars:
      - fromGroup: artistryx-shared-secrets
      - key: NODE_VERSION
        value: "20.x"
      - key: FRONTEND_URL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: SEED_PASSWORD
        sync: false

  # ── Prisma Studio (secure admin panel) ──────────────────────────────────────
  - type: web
    name: artistryx-studio
    runtime: node
    region: singapore
    plan: free
    rootDir: apps/api
    buildCommand: pnpm install && npx prisma generate
    startCommand: node scripts/secure-studio.js
    envVars:
      - key: DATABASE_URL
        fromGroup: artistryx-shared-secrets
      - key: NODE_VERSION
        value: "20.x"
      - key: STUDIO_USER
        sync: false
      - key: STUDIO_PASS
        sync: false
